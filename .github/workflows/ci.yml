name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test -p kimg-core

      - name: Build WASM
        run: |
          cargo build --target wasm32-unknown-unknown --release -p kimg-wasm

  build-wasm:
    name: WASM bindings
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build and bind
        run: |
          cargo build --target wasm32-unknown-unknown --release -p kimg-wasm
          wasm-bindgen target/wasm32-unknown-unknown/release/kimg_wasm.wasm \
            --out-dir pkg --target web --typescript

      - name: Check output exists
        run: |
          test -f pkg/kimg_wasm.js
          test -f pkg/kimg_wasm.d.ts
          test -f pkg/kimg_wasm_bg.wasm
          ls -lh pkg/kimg_wasm_bg.wasm
