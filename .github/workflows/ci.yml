name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: Install Rust tools
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli,cargo-audit,cargo-deny

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Check JS formatting
        run: npm run fmt:js:check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Run JS tests
        run: npm run test:js

      - name: Check WASM target
        run: cargo check --target wasm32-unknown-unknown -p kimg-wasm

      - name: Build distributable package
        run: ./scripts/build.sh

      - name: Run demo smoke test
        run: npm run test:demo
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Verify npm pack
        run: npm pack --json

      - name: Run cargo audit
        run: cargo audit

      - name: Run cargo deny
        run: cargo deny check --show-stats
