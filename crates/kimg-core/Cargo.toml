[package]
name = "kimg-core"
version = "0.1.0"
edition = "2021"
description = "Pure Rust pixel engine for layer-based image compositing"
license = "MIT"
repository = "https://github.com/iamkaf/kimg"
homepage = "https://github.com/iamkaf/kimg"
keywords = ["image", "compositor", "pixel", "layer", "blend"]
categories = ["multimedia::images", "graphics", "wasm"]

[dependencies]
png = "0.17"
jpeg-decoder = "0.3"
jpeg-encoder = "0.6"
image-webp = "0.2"
gif = "0.13"
psd = "0.3"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "blend"
harness = false

[[bench]]
name = "transform"
harness = false

[[bench]]
name = "convolution"
harness = false

[[bench]]
name = "filter"
harness = false

[[bench]]
name = "document"
harness = false

[[bench]]
name = "codec"
harness = false

[[bench]]
name = "sprite"
harness = false
